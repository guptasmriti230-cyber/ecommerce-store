<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store - Shop Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🛍️ ShopHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="pages/products.html">Products</a></li>
                <li><a href="pages/cart.html" class="cart-link">Cart <span class="cart-count">0</span></a></li>
                <li><a href="#login" id="loginBtn">Login</a></li>
                <li><a href="#register" id="registerBtn">Register</a></li>
                <li><a href="#logout" id="logoutBtn" style="display:none;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Welcome to ShopHub</h2>
            <p>Your One-Stop Shop for Everything</p>
            <button class="btn btn-primary" onclick="window.location.href='pages/products.html'">Shop Now</button>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="featured-products">
        <div class="container">
            <h2>Featured Products</h2>
            <div class="products-grid" id="featuredProducts">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 ShopHub. All rights reserved.</p>
            <p>Built with ❤️ for Freshers</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
