<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .cart-page-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        .empty-cart {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 8px;
        }
        .cart-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }
        .cart-items {
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #ecf0f1;
        }
        .item-details {
            flex: 1;
        }
        .item-total {
            font-weight: bold;
            text-align: right;
            margin-right: 1rem;
        }
        .item-remove {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .cart-summary {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            height: fit-content;
        }
        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🛍️ ShopHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html" class="active">Cart <span class="cart-count">0</span></a></li>
                <li><a href="#login" id="loginBtn">Login</a></li>
                <li><a href="#register" id="registerBtn">Register</a></li>
                <li><a href="#logout" id="logoutBtn" style="display:none;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Cart Content -->
    <div class="cart-page-container">
        <h2>Shopping Cart</h2>
        <div id="cartContent"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 ShopHub. All rights reserved.</p>
            <p>Built with ❤️ for Freshers</p>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            displayCart();
            checkUserLogin();
        });

        function displayCart() {
            const container = document.getElementById('cartContent');
            
            if (cart.cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <h2>Your cart is empty</h2>
                        <p>Add some products to get started!</p>
                        <a href="products.html" class="btn btn-primary">Continue Shopping</a>
                    </div>
                `;
                return;
            }

            const cartItemsHTML = cart.cart.map(item => `
                <div class="cart-item">
                    <div style="flex: 1;">
                        <strong>${item.name}</strong>
                        <p style="color: #e74c3c; font-weight: bold;">$${item.price.toFixed(2)} x ${item.quantity}</p>
                    </div>
                    <div class="item-total">$${(item.price * item.quantity).toFixed(2)}</div>
                    <button class="item-remove" onclick="removeItem(${item.id})">Remove</button>
                </div>
            `).join('');

            const total = cart.getCartTotal();

            container.innerHTML = `
                <div class="cart-content">
                    <div class="cart-items">
                        ${cartItemsHTML}
                    </div>
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row" style="display: flex; justify-content: space-between; margin: 1rem 0;">
                            <span>Subtotal:</span>
                            <span>$${total.toFixed(2)}</span>
                        </div>
                        <div class="summary-row" style="display: flex; justify-content: space-between; margin: 1rem 0;">
                            <span>Tax (10%):</span>
                            <span>$${(total * 0.1).toFixed(2)}</span>
                        </div>
                        <div class="summary-row" style="display: flex; justify-content: space-between; margin: 1rem 0; border-top: 2px solid #333; padding-top: 1rem; font-weight: bold; font-size: 1.2rem; color: #e74c3c;">
                            <span>Total:</span>
                            <span>$${(total * 1.1).toFixed(2)}</span>
                        </div>
                        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                    </div>
                </div>
            `;
        }

        function removeItem(productId) {
            cart.removeItem(productId);
            displayCart();
        }

        function checkout() {
            if (cart.cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            alert('Thank you for your purchase! ✅\n\nThis is a demo application.');
            cart.clearCart();
            displayCart();
        }
    </script>
</body>
</html>
